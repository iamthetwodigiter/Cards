name: cards
description: "UNO"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  dio: ^5.4.3
  web_socket_channel: ^3.0.0
  google_fonts: ^6.2.1
  uuid: ^4.4.0
  dice_bear: ^1.0.4
  flutter_svg: ^2.0.10
  device_info_plus: ^11.1.0
  emoji_picker_flutter: ^4.4.0
  app_links: ^6.3.2
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/logo.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 128



flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
